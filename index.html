  /* ===== BOOT ===== */
  .boot{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:14px}
  .spinner{width:34px;height:34px;border:3px solid var(--green-line);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ===== LOGIN ===== */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(140deg,#0e5b45 0%,#16785d 55%,#1f9e78 100%);padding:20px;position:relative;overflow:hidden}
  .login-wrap::before{content:"";position:absolute;width:520px;height:520px;border-radius:50%;
    background:rgba(255,255,255,.06);top:-160px;right:-120px}
  .login-wrap::after{content:"";position:absolute;width:360px;height:360px;border-radius:50%;
    background:rgba(255,255,255,.05);bottom:-140px;left:-100px}
  .auth-card{background:#fff;border-radius:22px;padding:32px 30px;width:392px;box-shadow:var(--shadow-lg);position:relative;z-index:1}
  .logo-plate{background:linear-gradient(135deg,#0e5b45,#16785d);border-radius:16px;padding:20px 24px;display:flex;justify-content:center;margin-bottom:18px}
  .logo-plate .masaru-logo{height:42px;width:210px}
  .sub-brand{text-align:center;color:var(--green-dark);font-weight:700;letter-spacing:3px;font-size:13px;margin-bottom:3px}
  .sub-desc{text-align:center;color:var(--muted);font-size:14px;margin-bottom:22px}
  .fld{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .fld label{font-size:13px;color:var(--muted);font-weight:600}
  .fld input,.fld select{padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fbfdfc;transition:.15s}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--green);background:#fff;box-shadow:0 0 0 3px var(--green-soft)}
  .btn-primary{background:var(--green);color:#fff;border:none;border-radius:11px;padding:13px;font-weight:700;font-size:15px;width:100%;transition:.15s}
  .btn-primary:hover{background:var(--green-dark)}
  .btn-primary:disabled{opacity:.55;cursor:not-allowed}
  .link{color:var(--green);cursor:pointer;font-weight:700}
  .switch-line{margin-top:14px;text-align:center;color:var(--muted);font-size:14px}
  .msg{font-size:13px;margin-top:9px;min-height:18px}
  .msg.err{color:var(--red)} .msg.ok{color:var(--green-dark)}

  /* ===== HUB ===== */
  header.top{background:linear-gradient(120deg,#0e5b45,#16785d);color:#fff;padding:15px 26px;
    display:flex;align-items:center;gap:14px;border-bottom:4px solid var(--gold)}
  header.top .masaru-logo{height:28px;width:140px}
  header.top .hdr-label{font-weight:600;font-size:15px;opacity:.95}
  header.top .spacer{flex:1}
  .role-pill{background:rgba(255,255,255,.16);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
  .logout{background:transparent;border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:9px;padding:8px 15px;font-size:13px;transition:.15s}
  .logout:hover{background:rgba(255,255,255,.12)}

  main{max-width:1040px;margin:0 auto;padding:36px 22px 60px}
  .hub-title{font-size:24px;color:var(--green-dark);font-weight:700;margin-bottom:5px;letter-spacing:-.3px}
  .hub-sub{color:var(--muted);margin-bottom:28px}
  .app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}
  .app-tile{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:24px;cursor:pointer;
    transition:transform .15s,box-shadow .15s,border-color .15s;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden}
  .app-tile::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--green),var(--gold));transform:scaleX(0);transform-origin:left;transition:.2s}
  .app-tile:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--green-line)}
  .app-tile:hover::before{transform:scaleX(1)}
  .app-icon{width:56px;height:56px;border-radius:14px;background:var(--green-soft);color:var(--green-dark);
    display:flex;align-items:center;justify-content:center;font-size:1.8rem}
  .app-name{font-size:18px;font-weight:700;color:var(--green-dark)}
  .app-desc{font-size:13.5px;color:var(--muted);line-height:1.55;flex:1}
  .app-go{color:var(--green);font-weight:700;font-size:14px;margin-top:2px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .app-newtab{color:var(--muted);font-weight:600;font-size:12px;border:1px solid var(--line);border-radius:8px;padding:5px 10px;background:#f8faf9;transition:.15s}
  .app-newtab:hover{background:var(--green-soft);border-color:var(--green-line);color:var(--green-dark)}
  .empty-apps{grid-column:1/-1;text-align:center;color:var(--muted);padding:44px;
    background:#fff;border:1px dashed var(--line);border-radius:14px}
  footer{text-align:center;color:var(--faint);font-size:.85rem;margin-top:40px}
  footer .tag{color:var(--green-dark);font-weight:600}

  @media(max-width:560px){
    header.top .hdr-label{display:none}
    .auth-card{padding:26px 22px}
  }
</style>
</head>
<body>

<!-- ===== BOOT ===== -->
<div id="bootScreen" class="boot"><div class="spinner"></div><div>กำลังโหลด...</div></div>

<!-- ===== LOGIN / SIGNUP ===== -->
<div id="authScreen" class="login-wrap hide">
  <div class="auth-card">
    <div class="logo-plate"><span class="masaru-logo"></span></div>
    <div class="sub-brand">HR PORTAL</div>
    <p class="sub-desc">ศูนย์รวมระบบฝ่ายบุคคล</p>

    <div id="loginBox">
      <div class="fld"><label>อีเมล</label><input id="email" type="email" placeholder="name@masaru.co.th" autocomplete="username"></div>
      <div class="fld"><label>รหัสผ่าน</label><input id="password" type="password" autocomplete="current-password"></div>
      <button class="btn-primary" id="loginBtn">เข้าสู่ระบบ</button>
      <div class="msg err hide" id="loginErr"></div>
      <div class="switch-line">ยังไม่มีบัญชี? <span class="link" id="toSignup">สมัครสมาชิก</span></div>
    </div>

    <div id="signupBox" class="hide">
      <div class="fld"><label>อีเมล</label><input id="suEmail" type="email" placeholder="name@masaru.co.th"></div>
      <div class="fld"><label>รหัสผ่าน (อย่างน้อย 6 ตัว)</label><input id="suPassword" type="password"></div>
      <div class="fld"><label>บทบาท</label>
        <select id="suRole">
          <option value="hr">เจ้าหน้าที่ HR</option>
          <option value="recruiter">สรรหาบุคลากร</option>
          <option value="hr_manager">หัวหน้าฝ่ายบุคคล</option>
          <option value="executive">ผู้บริหาร</option>
        </select>
      </div>
      <div class="fld"><label>รหัสเชิญ</label><input id="suInvite" placeholder="ขอจากแอดมิน"></div>
      <button class="btn-primary" id="signupBtn">สมัครสมาชิก</button>
      <div class="msg err hide" id="signupErr"></div>
      <div class="msg ok hide" id="signupOk"></div>
      <div class="switch-line">มีบัญชีแล้ว? <span class="link" id="toLogin">เข้าสู่ระบบ</span></div>
    </div>
  </div>
</div>

<!-- ===== HUB ===== -->
<div id="hubScreen" class="hide">
  <header class="top">
    <span class="masaru-logo"></span>
    <span class="hdr-label">ศูนย์รวมระบบฝ่ายบุคคล</span>
    <div class="spacer"></div>
    <span class="role-pill" id="rolePill">—</span>
    <button class="logout" id="logoutBtn">ออกจากระบบ</button>
  </header>
  <main>
    <div class="hub-title" id="hubGreet">เลือกระบบที่ต้องการใช้งาน</div>
    <div class="hub-sub" id="hubSub">แตะการ์ดเพื่อเข้าใช้งาน</div>
    <div class="app-grid" id="appGrid"></div>
    <footer><div class="tag">เหนือกว่า ทุกวัน — Surpass Every Day</div><div style="margin-top:4px">MASARU HR Portal</div></footer>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://iyycyvnvfmerxkcfalea.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ChkZClaeE6NCAxqyTqE4Yw_aTsz4zqi';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const $ = id => document.getElementById(id);

// ====================================================================
// ทะเบียนระบบ HR — พยายามดึงจากตาราง portal_apps ก่อน
// ถ้าไม่มีตาราง/โหลดไม่ได้ → ใช้ค่าสำรองด้านล่าง (ใช้งานได้ทันที)
// ====================================================================
const APPS_FALLBACK = [
  { key:'recruitment', icon:'ti-users-group', title:'ระบบรับสมัครงาน',
    desc:'จัดการผู้สมัคร คัดกรอง สัมภาษณ์ ไปจนถึงรับเข้าทำงาน พร้อมอัปโหลดเรซูเม่และรูป',
    url:'recruitment.html', roles:['hr','recruiter','hr_manager','executive'] },
  { key:'deadline', icon:'ti-bell-ringing', title:'ระบบเตือน Deadline HR',
    desc:'เตือนครบทดลองงาน 30/60/90 วัน · ลาคลอด/ประกันสังคม · ต่อสัญญา · ครบกำหนดเอกสาร พร้อมป๊อบอัพงานด่วน',
    url:'deadline.html', roles:['hr','hr_manager','executive'] },
  // ↓↓↓ การ์ดใหม่: ระบบแบบทดสอบบุคลิกภาพ (คนละ Supabase project — เป็นแค่ลิงก์)
  // *** หลัง deploy dashboard.html แล้ว เปลี่ยน url ด้านล่างเป็นลิงก์จริง ***
  { key:'quiz', icon:'ti-clipboard-text', title:'ระบบแบบทดสอบบุคลิกภาพ',
    desc:'ดูผลแบบทดสอบ MBTI & BOSI ของผู้สมัคร — กราฟเรดาร์และแท่งคะแนนก่อนสัมภาษณ์ (เข้าสู่ระบบด้วยบัญชี HR แยกต่างหาก)',
    url:'dashboard.html', roles:['hr','recruiter','hr_manager','executive'] },
];

async function loadApps(){
  try{
    const { data, error } = await sb.from('portal_apps')
      .select('*').eq('active', true).order('sort_order');
    if(error || !data || !data.length) return APPS_FALLBACK;
    return data.map(a => ({ key:a.app_key, icon:a.icon, title:a.title, desc:a.description, url:a.url, roles:a.roles || [] }));
  }catch(e){ return APPS_FALLBACK; }
}

const ROLE_LABEL = { hr:'เจ้าหน้าที่ HR', recruiter:'สรรหาบุคลากร', hr_manager:'หัวหน้าฝ่ายบุคคล', executive:'ผู้บริหาร' };

// อ่านบทบาท (รองรับทั้ง array และ single) — ถ้าไม่มีเลย ถือว่าเป็นผู้ใช้ HR ทั่วไป
function getRoles(session){
  const m = session.user?.app_metadata || {};
  if(Array.isArray(m.user_roles) && m.user_roles.length) return m.user_roles;
  if(m.user_role) return [m.user_role];
  return [];
}

// logout ที่แท็บใดก็ตาม → กลับหน้า login ทันที
sb.auth.onAuthStateChange((event, session) => {
  if(event === 'SIGNED_OUT' || !session){ showAuth(); }
});

(async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ showHub(session); } else { showAuth(); }
})();

function showAuth(){
  $('bootScreen').classList.add('hide');
  $('hubScreen').classList.add('hide');
  $('authScreen').classList.remove('hide');
}

async function showHub(session){
  const roles = getRoles(session);
  $('bootScreen').classList.add('hide');
  $('authScreen').classList.add('hide');
  $('hubScreen').classList.remove('hide');
  $('rolePill').textContent = roles.length ? 'บทบาท: ' + roles.map(r => ROLE_LABEL[r]||r).join(' · ') : 'ผู้ใช้ HR';
  $('appGrid').innerHTML = '<div class="empty-apps">กำลังโหลดรายการระบบ...</div>';

  const all = await loadApps();
  // ถ้าผู้ใช้ไม่มี role ที่กำหนด → เห็นทุกระบบ (กันล็อกเอาต์); ถ้ามี role → กรองตามสิทธิ์
  const apps = roles.length
    ? all.filter(a => !(a.roles||[]).length || a.roles.some(r => roles.includes(r)))
    : all;

  $('hubSub').textContent = apps.length
    ? `คุณเข้าใช้งานได้ ${apps.length} ระบบ — แตะการ์ดเพื่อเปิด (หรือกด “แท็บใหม่” เพื่อเปิดพร้อมกันหลายระบบ)`
    : 'ยังไม่มีระบบที่คุณมีสิทธิ์เข้าใช้งาน';

  const ic = n => `<i class="ti ${n}"></i>`;
  $('appGrid').innerHTML = apps.length
    ? apps.map(a => `
      <div class="app-tile" data-url="${a.url}">
        <div class="app-icon">${ic(a.icon)}</div>
        <div class="app-name">${a.title}</div>
        <div class="app-desc">${a.desc}</div>
        <div class="app-go">เข้าใช้งาน ${ic('ti-arrow-right')}
          <span class="app-newtab" data-url="${a.url}" title="เปิดในแท็บใหม่">${ic('ti-external-link')} แท็บใหม่</span>
        </div>
      </div>`).join('')
    : `<div class="empty-apps">ยังไม่มีระบบที่บทบาทนี้เข้าใช้งานได้<br>ติดต่อแอดมินเพื่อขอสิทธิ์เพิ่ม</div>`;

  document.querySelectorAll('.app-tile').forEach(t =>
    t.addEventListener('click', () => { window.location.href = t.dataset.url; }));
  document.querySelectorAll('.app-newtab').forEach(b =>
    b.addEventListener('click', e => { e.stopPropagation(); window.open(b.dataset.url, '_blank'); }));
}

function showLoginErr(msg){ const e=$('loginErr'); e.textContent=msg; e.classList.remove('hide'); }

// ===== LOGIN =====
$('loginBtn').addEventListener('click', doLogin);
$('password').addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });
async function doLogin(){
  const email = $('email').value.trim(), password = $('password').value;
  $('loginErr').classList.add('hide');
  if(!email || !password){ showLoginErr('กรุณากรอกอีเมลและรหัสผ่าน'); return; }
  $('loginBtn').disabled = true; $('loginBtn').textContent = 'กำลังเข้าสู่ระบบ...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  $('loginBtn').disabled = false; $('loginBtn').textContent = 'เข้าสู่ระบบ';
  if(error){
    showLoginErr(/confirm/i.test(error.message)
      ? 'อีเมลนี้ยังไม่ได้ยืนยัน — แจ้งแอดมินปิด "ยืนยันอีเมล" ใน Supabase'
      : 'อีเมลหรือรหัสผ่านไม่ถูกต้อง');
    return;
  }
  showHub(data.session);
}

// ===== สลับ login / signup =====
$('toSignup').addEventListener('click', () => {
  $('loginErr').classList.add('hide');
  $('loginBox').classList.add('hide'); $('signupBox').classList.remove('hide');
});
$('toLogin').addEventListener('click', () => {
  $('signupErr').classList.add('hide'); $('signupOk').classList.add('hide');
  $('signupBox').classList.add('hide'); $('loginBox').classList.remove('hide');
});

// ===== SIGNUP =====
$('signupBtn').addEventListener('click', doSignup);
async function doSignup(){
  const email = $('suEmail').value.trim(), password = $('suPassword').value;
  const preset = $('suRole').value, invite = $('suInvite').value.trim();
  const err = $('signupErr'), ok = $('signupOk');
  err.classList.add('hide'); ok.classList.add('hide');

  if(!email || !password){ err.textContent='กรุณากรอกอีเมลและรหัสผ่าน'; err.classList.remove('hide'); return; }
  if(password.length < 6){ err.textContent='รหัสผ่านต้องอย่างน้อย 6 ตัว'; err.classList.remove('hide'); return; }
  if(!invite){ err.textContent='กรุณากรอกรหัสเชิญ'; err.classList.remove('hide'); return; }

  $('signupBtn').disabled = true; $('signupBtn').textContent = 'กำลังสมัคร...';
  const { error } = await sb.auth.signUp({ email, password,
    options: { data: { user_role_preset: preset, invite_code: invite } } });
  $('signupBtn').disabled = false; $('signupBtn').textContent = 'สมัครสมาชิก';
  if(error){
    err.textContent = 'สมัครไม่สำเร็จ — รหัสเชิญอาจไม่ถูกต้อง หรืออีเมลนี้ถูกใช้แล้ว';
    err.classList.remove('hide'); return;
  }
  $('suEmail').value=''; $('suPassword').value=''; $('suInvite').value='';
  ok.textContent = '🎉 สมัครสำเร็จ! กดปุ่ม "เข้าสู่ระบบ" เพื่อเริ่มใช้งาน';
  ok.classList.remove('hide');
}

$('logoutBtn').addEventListener('click', async () => { await sb.auth.signOut(); location.reload(); });
</script>
</body>
</html>
