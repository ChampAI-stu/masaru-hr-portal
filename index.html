<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASARU HR — ศูนย์รวมระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
  :root{
    --bg:#f4f6f4; --surface:#ffffff; --ink:#17241f; --muted:#6c7671; --faint:#9aa39e;
    --line:#e6e9e4; --line-soft:#eef1ec;
    --green:#16785d; --green-dark:#0e5b45; --green-soft:#e2f3ec; --green-line:#c6e6d7;
    --radius:14px; --shadow:0 1px 2px rgba(23,36,31,.04),0 4px 16px rgba(23,36,31,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;min-height:100vh}
  .wrap{max-width:1040px;margin:0 auto;padding:32px 20px 48px}

  /* Header */
  header{display:flex;align-items:center;gap:18px;margin-bottom:8px}
  .logo-plate{background:linear-gradient(135deg,#241c18 0%,#14100e 100%);border-radius:16px;
    padding:14px 18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .logo-plate img{height:46px;display:block}
  header h1{font-size:1.7rem;font-weight:700;letter-spacing:-.3px}
  header .sub{color:var(--muted);font-size:1rem;margin-top:2px}
  .hr-line{height:1px;background:var(--line);margin:24px 0 28px}

  /* Section label */
  .sec{font-size:.82rem;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}

  /* Cards grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;
    text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:12px;transition:.16s;position:relative;overflow:hidden}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--green-line)}
  .card.soon{opacity:.62;pointer-events:none}
  .card-top{display:flex;align-items:center;gap:14px}
  .ic{width:52px;height:52px;border-radius:13px;background:var(--green-soft);color:var(--green-dark);
    display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0}
  .card h3{font-size:1.15rem;font-weight:600}
  .card p{color:var(--muted);font-size:.92rem;line-height:1.55;flex:1}
  .go{color:var(--green);font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:5px}
  .badge{position:absolute;top:14px;right:14px;font-size:.68rem;font-weight:600;padding:3px 10px;border-radius:20px;
    background:var(--green-soft);color:var(--green-dark)}
  .badge.wip{background:#f3ecdf;color:#8a5a12}

  footer{text-align:center;color:var(--faint);font-size:.85rem;margin-top:36px}
  footer .tag{color:var(--green-dark);font-weight:600}

  @media(max-width:560px){
    header{flex-direction:column;align-items:flex-start;gap:12px}
    header h1{font-size:1.4rem}
  }
</style>
</head>

  <div class="hr-line"></div>

  <div class="sec">ระบบที่ใช้งานได้</div>
  <div class="grid" id="grid"></div>

  <footer>
    <div class="tag">เหนือกว่า ทุกวัน — Surpass Every Day</div>

  </footer>

<script>
"use strict";
// ─── แก้ลิงก์ตรงนี้ได้ ถ้าไฟล์อยู่คนละที่/คนละ path ───
const TOOLS = [
  { icon:"ti-users-group", title:"ระบบรับสมัครงาน", href:"index.html",
    desc:"จัดการผู้สมัคร คัดกรอง สัมภาษณ์ ไปจนถึงรับเข้าทำงาน พร้อมอัปโหลดเรซูเม่และรูป" },
  { icon:"ti-bell-ringing", title:"ระบบเตือน Deadline HR", href:"hr-deadline.html",
    desc:"เตือนครบทดลองงาน 30/60/90 วัน · ลาคลอด/ประกันสังคม · ต่อสัญญา · ครบกำหนดเอกสาร พร้อมป๊อบอัพงานด่วน" },
  // เพิ่มระบบใหม่ได้ที่นี่ เช่น:
  // { icon:"ti-clipboard-check", title:"ชื่อระบบ", href:"xxx.html", desc:"คำอธิบาย" },
  // ระบบที่ยังไม่พร้อม ใส่ soon:true จะเป็นการ์ดจาง ๆ กดไม่ได้
  { icon:"ti-report-analytics", title:"รายงาน HR รายวัน", href:"#", soon:true,
    desc:"สรุปการเข้างาน/มาสายรายวันจาก JST (กำลังเชื่อมต่อ)" },
];

function iconTag(name){ return '<i class="ti '+name+'"></i>'; }
document.getElementById("grid").innerHTML = TOOLS.map(t=>{
  const soon = t.soon;
  const badge = soon ? '<span class="badge wip">เร็ว ๆ นี้</span>' : '<span class="badge">พร้อมใช้</span>';
  const go = soon ? '' : '<span class="go">เปิดระบบ '+iconTag("ti-arrow-right")+'</span>';
  const tag = soon ? "div" : "a";
  const href = soon ? "" : ('href="'+t.href+'"');
  return '<'+tag+' class="card'+(soon?' soon':'')+'" '+href+'>'
    + badge
    + '<div class="card-top"><div class="ic">'+iconTag(t.icon)+'</div><h3>'+t.title+'</h3></div>'
    + '<p>'+t.desc+'</p>'
    + go
    + '</'+tag+'>';
}).join("");
</script>
