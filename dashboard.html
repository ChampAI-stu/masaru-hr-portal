<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASARU HR | ผลแบบทดสอบผู้สมัคร</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css">
<style>
  :root{
    --green:#16785d; --green-dark:#0e5b45; --green-soft:#e2f3ec; --green-line:#c6e6d7;
    --gold:#C9A84C; --blue:#16785d;
    --bg:#f1f5f2; --card:#ffffff; --line:#e3e9e4;
    --text:#16241f; --muted:#6b756f; --red:#b23a48;
    --radius:16px; --shadow:0 1px 2px rgba(16,60,45,.05),0 8px 28px rgba(16,60,45,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
  /* login */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;
    background:linear-gradient(140deg,#0e5b45 0%,#16785d 55%,#1f9e78 100%)}
  .lcard{background:#fff;border-radius:22px;padding:32px 30px;width:372px;box-shadow:0 20px 60px rgba(10,60,45,.28)}
  .llogo{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--green-dark);font-size:22px;justify-content:center;margin-bottom:6px}
  .llogo .b{background:linear-gradient(135deg,#0e5b45,#16785d);color:#fff;width:34px;height:34px;border-radius:9px;display:grid;place-items:center}
  .lsub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:20px}
  label{display:block;font-weight:600;font-size:13px;margin:12px 0 5px;color:var(--muted)}
  input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:15px;background:#fbfdfc;transition:.15s}
  input:focus{outline:none;border-color:var(--green);background:#fff;box-shadow:0 0 0 3px var(--green-soft)}
  .btn{width:100%;padding:13px;border:none;border-radius:11px;background:var(--green);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;transition:.15s}
  .btn:hover{background:var(--green-dark)}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .lerr{display:none;background:#FCEBEB;color:var(--red);padding:10px;border-radius:8px;font-size:13px;margin-top:12px}
  /* app */
  #app{display:none}
  header{background:linear-gradient(120deg,#0e5b45,#16785d);color:#fff;padding:15px 26px;
    display:flex;align-items:center;justify-content:space-between;border-bottom:4px solid var(--gold)}
  header .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
  header .brand .b{background:#fff;color:var(--green-dark);width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-weight:700}
  header .u{display:flex;align-items:center;gap:10px;font-size:14px}
  header .u button{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);color:#fff;padding:8px 13px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:6px}
  header .u button:hover{background:rgba(255,255,255,.26)}
  header .u .back{background:transparent}
  .layout{display:grid;grid-template-columns:320px 1fr;gap:18px;max-width:1180px;margin:24px auto;padding:0 18px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .panel h3{color:var(--green-dark);font-size:15px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
  .count{background:var(--green-soft);color:var(--green-dark);font-size:12px;padding:2px 9px;border-radius:99px;font-weight:600}
  .cand{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:9px;cursor:pointer;transition:.15s}
  .cand:hover{border-color:var(--green-line);background:#f5faf7}
  .cand.on{border-color:var(--green);background:var(--green-soft)}
  .cand .nm{font-weight:600;font-size:15px}
  .cand .ps{color:var(--muted);font-size:12px;margin:2px 0 8px}
  .badges{display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:12px;font-weight:600;padding:3px 9px;border-radius:99px}
  .tag.mbti{background:var(--green-soft);color:var(--green-dark)}
  .tag.bosi{background:#FBF3DD;color:#8a6d18}
  .empty{color:var(--muted);text-align:center;padding:40px 10px;font-size:14px}
  /* detail */
  #detail .head{display:flex;align-items:center;gap:14px;padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:16px}
  #detail .av{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#0e5b45,#16785d);color:#fff;display:grid;place-items:center;font-size:20px;font-weight:700}
  #detail .head .nm{font-size:19px;font-weight:700;color:var(--green-dark)}
  #detail .head .ps{color:var(--muted);font-size:13px}
  .delbtns{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
  .del,.del2{padding:8px 14px;border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
  .del2{background:var(--green-soft);color:var(--green-dark);border:1px solid var(--green-line)}
  .del2:hover{background:#d6ebdf}
  .del{background:#FCEBEB;color:var(--red);border:1px solid #F3C9C9}
  .del:hover{background:#F7DDDD}
  .del:disabled,.del2:disabled{opacity:.5;cursor:not-allowed}
  .sect{margin-bottom:22px}
  .sect .st{font-weight:700;color:var(--green-dark);font-size:15px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .sect .st .type{background:var(--green);color:#fff;font-size:13px;padding:2px 10px;border-radius:8px}
  .sect .arche{color:var(--muted);font-size:13px;margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  .chartbox{max-width:320px;margin:0 auto}
  .dim{display:grid;grid-template-columns:22px 1fr 22px 92px;align-items:center;gap:8px;margin-bottom:9px;font-size:13px}
  .dim b{font-weight:700;text-align:center}
  .dimbar{height:9px;background:var(--green-line);border-radius:99px;overflow:hidden}
  .dimbar>i{display:block;height:100%;background:var(--green)}
  .dim .pct{color:var(--muted);font-size:12px;text-align:right}
  .bosibar{display:grid;grid-template-columns:130px 1fr 44px;align-items:center;gap:10px;margin-bottom:11px;font-size:14px}
  .bosibar .lab{font-weight:600}
  .bosibar .track{height:12px;background:#e8f1ec;border-radius:99px;overflow:hidden}
  .bosibar .track>i{display:block;height:100%;border-radius:99px}
  .bosibar .v{font-weight:700;text-align:right;font-size:13px}
  .note{background:#f5faf7;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--muted);margin-top:6px}
  @media(max-width:820px){.layout{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
  @media(max-width:560px){header .brand span:last-child{display:none}}
</style>
</head>
<body>

<div id="login">
  <div class="lcard">
    <div class="llogo"><span class="b">M</span> MASARU HR</div>
    <div class="lsub">ผลแบบทดสอบผู้สมัคร (MBTI &amp; BOSI)</div>
    <label>อีเมล</label>
    <input id="l-email" type="email" placeholder="you@masaru.com" autocomplete="username">
    <label>รหัสผ่าน</label>
    <input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" id="login-btn">เข้าสู่ระบบ</button>
    <div class="lerr" id="login-err">อีเมลหรือรหัสผ่านไม่ถูกต้อง</div>
  </div>
</div>

<div id="app">
  <header>
    <div class="brand"><span class="b">M</span> ผลแบบทดสอบผู้สมัคร</div>
    <div class="u">
      <span id="u-name"></span>
      <button class="back" id="backHub"><i class="ti ti-arrow-left"></i> หน้าหลัก</button>
      <button id="copyQuiz"><i class="ti ti-link"></i> คัดลอกลิงก์แบบทดสอบ</button>
      <button id="logout"><i class="ti ti-logout"></i> ออกจากระบบ</button>
    </div>
  </header>
  <div class="layout">
    <div class="panel">
      <h3>ผู้สมัคร <span class="count" id="cnt">0</span></h3>
      <div id="list"><div class="empty">กำลังโหลด...</div></div>
    </div>
    <div class="panel" id="detail"><div class="empty">เลือกผู้สมัครทางซ้ายเพื่อดูผลแบบทดสอบ</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
const SUPABASE_URL = "https://kxgqfwljzqjxperyxnfn.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_vh-qLGPFmlSZ0VWxQIG3CA_CMHDAZKv";
// ลิงก์หน้าทำแบบทดสอบ (repo hrmbmtiquiz) — ถ้า URL เปลี่ยน แก้ตรงนี้จุดเดียว
const QUIZ_URL = "https://champai-stu.github.io/hrmbmtiquiz/";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const MBTI_TYPES = {
  INTJ:["นักวางแผน","Architect"], INTP:["นักคิด","Logician"],
  ENTJ:["ผู้บัญชาการ","Commander"], ENTP:["นักโต้วาที","Debater"],
  INFJ:["ผู้สนับสนุน","Advocate"], INFP:["ผู้ไกล่เกลี่ย","Mediator"],
  ENFJ:["ผู้นำ","Protagonist"], ENFP:["นักรณรงค์","Campaigner"],
  ISTJ:["นักปฏิบัติ","Logistician"], ISFJ:["ผู้พิทักษ์","Defender"],
  ESTJ:["ผู้บริหาร","Executive"], ESFJ:["ผู้ให้","Consul"],
  ISTP:["นักแก้ปัญหา","Virtuoso"], ISFP:["นักผจญภัย","Adventurer"],
  ESTP:["ผู้ประกอบการ","Entrepreneur"], ESFP:["ผู้สร้างความบันเทิง","Entertainer"],
};
const BOSI = {
  B:["Builder — นักสร้าง","#C00000"], O:["Opportunist — นักโอกาส","#BA7517"],
  S:["Specialist — ผู้เชี่ยวชาญ","#1E7145"], I:["Innovator — นักคิดค้น","#2E75B6"],
};
const DIMS = [["E","I"],["S","N"],["T","F"],["J","P"]];

const $ = id => document.getElementById(id);
const ini = n => (n||"?").trim().charAt(0).toUpperCase();
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

let DATA = {};      // applicant_id -> {id,name,pos,mbti,bosi}
let selId = null;
let radarChart = null, bosiChart = null;

// ---------- auth ----------
$("login-btn").onclick = doLogin;
$("l-pass").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });

async function doLogin(){
  const email = $("l-email").value.trim();
  const pass = $("l-pass").value;
  const btn = $("login-btn");
  $("login-err").style.display = "none";
  btn.disabled = true; btn.textContent = "กำลังเข้าสู่ระบบ...";
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = "เข้าสู่ระบบ";
  if(error){ $("login-err").style.display = "block"; return; }
  afterLogin(data.user);
}

function afterLogin(user){
  const name = (user.user_metadata && user.user_metadata.name) || (user.email||"").split("@")[0];
  $("u-name").textContent = name;
  $("login").style.display = "none";
  $("app").style.display = "block";
  loadData();
}

$("backHub").onclick = () => { window.location.href = "index.html"; };
$("logout").onclick = async () => { await sb.auth.signOut(); location.reload(); };

$("copyQuiz").onclick = async () => {
  const btn = $("copyQuiz");
  const reset = () => { btn.innerHTML = `<i class="ti ti-link"></i> คัดลอกลิงก์แบบทดสอบ`; };
  const done = () => { btn.innerHTML = `<i class="ti ti-check"></i> คัดลอกแล้ว`; setTimeout(reset, 1800); };
  try{
    await navigator.clipboard.writeText(QUIZ_URL);
    done();
  }catch(e){
    // fallback: เลือกข้อความจากกล่องชั่วคราว (เผื่อเบราว์เซอร์บล็อก clipboard)
    const t = document.createElement("textarea");
    t.value = QUIZ_URL; t.style.position = "fixed"; t.style.opacity = "0";
    document.body.appendChild(t); t.select();
    try{ document.execCommand("copy"); done(); }
    catch(_){ prompt("คัดลอกลิงก์นี้:", QUIZ_URL); }
    document.body.removeChild(t);
  }
};

sb.auth.getSession().then(({ data:{ session } }) => { if(session) afterLogin(session.user); });

// ---------- load ----------
async function loadData(){
  const { data, error } = await sb.from("results").select(
    "result_type, scores, computed_at, quiz_sessions(respondent_id, quiz_respondents(id,name,pos), quizzes(type))"
  ).order("computed_at", { ascending:false });

  if(error){ $("list").innerHTML = `<div class="empty">โหลดไม่สำเร็จ: ${esc(error.message)}</div>`; return; }

  DATA = {};
  for(const row of (data||[])){
    const s = row.quiz_sessions; if(!s || !s.quiz_respondents) continue;
    const a = s.quiz_respondents;
    const type = s.quizzes ? s.quizzes.type : null;
    if(!DATA[a.id]) DATA[a.id] = { id:a.id, name:a.name, pos:a.pos, mbti:null, bosi:null };
    if(type==="MBTI") DATA[a.id].mbti = { type:row.result_type, scores:row.scores };
    if(type==="BOSI") DATA[a.id].bosi = { type:row.result_type, scores:row.scores };
  }
  renderList();
}

function renderList(){
  const arr = Object.values(DATA);
  $("cnt").textContent = arr.length;
  if(!arr.length){ $("list").innerHTML = `<div class="empty">ยังไม่มีผู้สมัครที่ทำแบบทดสอบ</div>`; return; }
  $("list").innerHTML = arr.map(a => `
    <div class="cand ${a.id===selId?"on":""}" data-id="${a.id}">
      <div class="nm">${esc(a.name)}</div>
      <div class="ps">${esc(a.pos||"—")}</div>
      <div class="badges">
        ${a.mbti?`<span class="tag mbti">${esc(a.mbti.type)}</span>`:""}
        ${a.bosi?`<span class="tag bosi">${esc(BOSI[a.bosi.type]?BOSI[a.bosi.type][0]:a.bosi.type)}</span>`:""}
      </div>
    </div>`).join("");
  $("list").querySelectorAll(".cand").forEach(el =>
    el.onclick = () => { selId = el.dataset.id; renderList(); renderDetail(DATA[selId]); });
}

function renderDetail(a){
  if(!a) return;
  const m = a.mbti, b = a.bosi;
  const arche = m && MBTI_TYPES[m.type] ? MBTI_TYPES[m.type] : null;

  const dimBars = m ? DIMS.map(([l,r])=>{
    const lv = m.scores[l]??0, rv = m.scores[r]??0;
    return `<div class="dim"><b>${l}</b>
      <div class="dimbar"><i style="width:${lv}%"></i></div>
      <b>${r}</b><span class="pct">${lv}% / ${rv}%</span></div>`;
  }).join("") : "";

  const bosiBars = b ? ["B","O","S","I"].map(k=>{
    const v = b.scores[k]??0, meta = BOSI[k];
    return `<div class="bosibar"><span class="lab" style="color:${meta[1]}">${esc(meta[0])}</span>
      <div class="track"><i style="width:${v}%;background:${meta[1]}"></i></div>
      <span class="v">${v}%</span></div>`;
  }).join("") : "";

  $("detail").innerHTML = `
    <div class="head">
      <div class="av">${ini(a.name)}</div>
      <div><div class="nm">${esc(a.name)}</div><div class="ps">${esc(a.pos||"—")}</div></div>
      <div class="delbtns">
        <button class="del" id="del-btn">ลบผู้ทำแบบทดสอบ</button>
      </div>
    </div>
    ${m?`
    <div class="sect">
      <div class="st">MBTI <span class="type">${esc(m.type)}</span></div>
      <div class="arche">${arche?esc(arche[0])+" ("+esc(arche[1])+")":""}</div>
      <div class="grid2">
        <div class="chartbox"><canvas id="radar"></canvas></div>
        <div>${dimBars}</div>
      </div>
    </div>`:""}
    ${b?`
    <div class="sect">
      <div class="st">BOSI DNA <span class="type">${esc(b.type)} — เด่นสุด</span></div>
      <div class="arche">สัดส่วนทั้ง 4 ด้านของผู้สมัคร</div>
      ${bosiBars}
    </div>`:""}
    <div class="note">ผลนี้เป็นข้อมูลประกอบเพื่อทำความเข้าใจผู้สมัครก่อนสัมภาษณ์ — ไม่ใช่เกณฑ์ผ่าน/ไม่ผ่าน และไม่ใช่แบบทดสอบทางการที่มีลิขสิทธิ์</div>`;

  $("del-btn").onclick = () => deleteRespondent(a.id, a.name);

  if(radarChart){ radarChart.destroy(); radarChart = null; }
  if(bosiChart){ bosiChart.destroy(); bosiChart = null; }

  if(m){
    radarChart = new Chart($("radar"), {
      type:"radar",
      data:{ labels:["E","S","T","J"],
        datasets:[{ data:[m.scores.E??0,m.scores.S??0,m.scores.T??0,m.scores.J??0],
          fill:true, backgroundColor:"rgba(22,120,93,.15)", borderColor:"#16785d",
          pointBackgroundColor:"#16785d", borderWidth:2 }]},
      options:{ plugins:{legend:{display:false}},
        scales:{ r:{ min:0,max:100, ticks:{display:false,stepSize:25},
          grid:{color:"#c6e6d7"}, angleLines:{color:"#c6e6d7"},
          pointLabels:{font:{size:14,weight:"600",family:"'IBM Plex Sans Thai'"},color:"#0e5b45"} } },
        responsive:true }
    });
  }
}

// ลบผู้ทำแบบทดสอบทั้ง record (คน + ผล MBTI/BOSI) — อยู่ในระบบข้อสอบเท่านั้น ไม่กระทบพอร์ทัล
async function deleteRespondent(id, name){
  if(!confirm(`ลบ "${name}" ออกจากระบบแบบทดสอบ?\n\nลบทั้งข้อมูลและผล MBTI/BOSI (กู้คืนไม่ได้) — ไม่กระทบระบบรับสมัคร`)) return;
  const btn = $("del-btn");
  if(btn){ btn.disabled = true; btn.textContent = "กำลังลบ..."; }
  try{
    // ลบ quiz_respondents -> cascade ลบ quiz_sessions / answers / results อัตโนมัติ
    const { error } = await sb.from("quiz_respondents").delete().eq("id", id);
    if(error) throw error;
    delete DATA[id]; selId = null; renderList();
    $("detail").innerHTML = `<div class="empty">ลบเรียบร้อย — เลือกผู้ทำแบบทดสอบทางซ้ายเพื่อดูผล</div>`;
  }catch(err){
    if(btn){ btn.disabled = false; btn.textContent = "ลบผู้ทำแบบทดสอบ"; }
    alert("ลบไม่สำเร็จ: " + (err.message||err));
  }
}
</script>
</body>
</html>
